  <style>
    :root {
      --ink: #1d1d1f;
      --ink-secondary: #424245;
      --ink-tertiary: #6e6e73;
      --ink-quaternary: #86868b;
      --surface: #fbfbfd;
      --surface-elevated: #ffffff;
      --border: rgba(0,0,0,0.08);
      --accent: #0071e3;
      --live-green: #34c759;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      font-family: 'Noto Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: var(--surface);
      color: var(--ink);
      min-height: 100vh;
      padding: 0 20px;
    }

    .spot-page {
      max-width: 400px;
      margin: 0 auto;
      padding-top: 24px;
      padding-bottom: 32px;
    }

    .spot-back {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--accent);
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      margin-bottom: 20px;
    }
    .spot-back:hover { text-decoration: underline; }

    .spot-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .spot-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }
    .spot-subtitle {
      font-size: 15px;
      color: var(--ink-tertiary);
    }

    /* Scanning indicator */
    .spot-scanner {
      text-align: center;
      padding: 20px 0;
      display: none;
    }
    .spot-scanner.active { display: block; }

    .scanner-ring {
      width: 64px;
      height: 64px;
      margin: 0 auto 12px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .scanner-heading {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }
    .scanner-label {
      font-size: 13px;
      color: var(--ink-quaternary);
      margin-top: 2px;
    }

    /* Start button */
    .spot-start {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .spot-start:hover { opacity: 0.85; }
    .spot-start:disabled { opacity: 0.5; cursor: not-allowed; }
    .spot-start.stop-btn {
      background: none;
      color: var(--ink-tertiary);
      border: 1px solid var(--border);
      font-size: 15px;
      padding: 12px;
    }

    .spot-status {
      text-align: center;
      font-size: 14px;
      color: var(--ink-tertiary);
      margin: 12px 0;
    }
    .spot-status.error { color: #dc2626; }

    /* Result card */
    .spot-result {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      margin-top: 16px;
      display: none;
      animation: slideUp 0.3s ease-out;
    }
    .spot-result.visible { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-top {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
    }
    .result-flag {
      width: 40px;
      height: 30px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }
    .result-info { flex: 1; min-width: 0; }
    .result-name {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .result-type {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 980px;
      color: white;
      margin-top: 4px;
    }

    .result-stats {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 1px solid var(--border);
    }
    .result-stat {
      text-align: center;
      padding: 12px 8px;
    }
    .result-stat + .result-stat { border-left: 1px solid var(--border); }
    .result-stat-value {
      font-size: 18px;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.02em;
      font-variant-numeric: tabular-nums;
    }
    .result-stat-label {
      font-size: 11px;
      color: var(--ink-quaternary);
      margin-top: 2px;
    }

    .result-details {
      border-top: 1px solid var(--border);
      padding: 8px 16px;
    }
    .result-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
    }
    .result-row + .result-row { border-top: 1px solid var(--border); }
    .result-row-label { color: var(--ink-tertiary); }
    .result-row-value { font-weight: 500; color: var(--ink); }

    /* No match */
    .no-match {
      text-align: center;
      padding: 32px 16px;
      display: none;
    }
    .no-match.visible { display: block; }
    .no-match-icon { font-size: 40px; margin-bottom: 8px; }
    .no-match p {
      color: var(--ink-tertiary);
      font-size: 15px;
      line-height: 1.5;
    }
  </style>
</head>

      $('t-subtitle').textContent = S.subtitle;
      $('t-start').textContent = S.start;
      $('t-scanning').textContent = S.scanning;
      $('t-distance').textContent = S.distance;
      $('t-speed').textContent = S.speed;
      $('t-bearing').textContent = S.bearing;
      $('t-dest-label').textContent = S.destination;
      $('t-dim-label').textContent = S.dimensions;
      $('t-status-label').textContent = S.status;
      $('t-no-match').innerHTML = S.no_match;
      document.title = S.title + ' — Quy Nhon Life';
    }
    applyLang();

    async function loadVessels() {
      try {
        const res = await fetch('/api/vessels');
        vessels = await res.json();
      } catch (e) { console.error('Failed to load vessels:', e); }
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function bearingTo(lat1, lon1, lat2, lon2) {
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const y = Math.sin(dLon) * Math.cos(lat2 * Math.PI / 180);
      const x = Math.cos(lat1*Math.PI/180) * Math.sin(lat2*Math.PI/180) -
                Math.sin(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.cos(dLon);
      return ((Math.atan2(y, x) * 180 / Math.PI) + 360) % 360;
    }

    function angleDiff(a, b) {
      let d = ((b - a + 180) % 360) - 180;
      return Math.abs(d < -180 ? d + 360 : d);
    }

    function lerpAngle(from, to, t) {
      let diff = ((to - from + 540) % 360) - 180;
      return ((from + diff * t) + 360) % 360;
    }

    function findMatchingVessel() {
      if (userLat == null || compassHeading == null || vessels.length === 0) return null;
      const CONE_HALF = 15;
      const MAX_DIST = 50;
      let best = null, bestDist = Infinity;
      for (const v of vessels) {
        if (v.lat == null || v.lng == null) continue;
        const dist = haversine(userLat, userLng, v.lat, v.lng);
        if (dist > MAX_DIST) continue;
        const bearing = bearingTo(userLat, userLng, v.lat, v.lng);
        const diff = angleDiff(compassHeading, bearing);
        if (diff <= CONE_HALF && dist < bestDist) {
          best = { ...v, dist, bearing };
          bestDist = dist;
        }
      }
      return best;
    }

    function showResult(vessel) {
      $('no-match').classList.remove('visible');
      $('spot-result').classList.add('visible');

      const cc = (vessel.flag_country || '').toLowerCase();
      $('result-flag').src = cc ? `https://flagcdn.com/40x30/${cc}.png` : '';
      $('result-flag').style.display = cc ? '' : 'none';
      $('result-name').textContent = vessel.name || vessel.mmsi;

      const type = vessel.vessel_type_label || 'Other';
      $('result-type').textContent = translateType(type);
      $('result-type').style.background = TYPE_COLORS[type] || TYPE_COLORS.Other;

      $('result-distance').textContent = vessel.dist < 1 ? (vessel.dist * 1000).toFixed(0) + ' m' : vessel.dist.toFixed(1) + ' km';
      $('result-speed').textContent = vessel.speed != null ? vessel.speed.toFixed(1) + ' kn' : '--';
      $('result-bearing').textContent = Math.round(vessel.bearing) + '\u00B0';

      $('result-destination').textContent = vessel.destination || '--';
      $('result-dimensions').textContent = vessel.length && vessel.width ? `${vessel.length} x ${vessel.width} m` : '--';
      $('result-status').textContent = translateStatus(vessel.nav_status_label);
    }

    function showNoMatch() {
      $('spot-result').classList.remove('visible');
      $('no-match').classList.add('visible');
    }

    function onOrientation(e) {
      let heading = null;
      if (e.webkitCompassHeading != null) {
        heading = e.webkitCompassHeading;
      } else if (e.alpha != null) {
        heading = e.absolute ? (360 - e.alpha) : e.alpha;
      }
      if (heading != null) {
        smoothedHeading = smoothedHeading == null ? heading : lerpAngle(smoothedHeading, heading, SMOOTHING);
        compassHeading = smoothedHeading;
        $('scanner-heading').textContent = Math.round(smoothedHeading) + '\u00B0';
      }
    }

    async function startSpotting() {
      const btn = $('spot-start');
      const status = $('spot-status');

      if (active) { stopSpotting(); return; }

      btn.disabled = true;
      status.textContent = S.getting_perms;
      status.className = 'spot-status';

      // iOS compass permission (must be in direct user gesture)
      if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
        try {
          const response = await DeviceOrientationEvent.requestPermission();
          if (response !== 'granted') {
            status.textContent = S.no_compass_perm;
            status.className = 'spot-status error';
            btn.disabled = false;
            return;
          }
        } catch (e) {
          status.textContent = S.no_compass_perm;
          status.className = 'spot-status error';
          btn.disabled = false;
          return;
        }
      } else if (!('DeviceOrientationEvent' in window)) {
        status.textContent = S.no_compass;
        status.className = 'spot-status error';
        btn.disabled = false;
        return;
      }

      status.textContent = S.getting_loc;

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;

          window.addEventListener('deviceorientationabsolute', onOrientation, true);
          window.addEventListener('deviceorientation', onOrientation, true);

          active = true;
          btn.disabled = false;
          $('t-start').textContent = S.stop;
          btn.classList.add('stop-btn');
          status.textContent = S.point;
          $('spot-scanner').classList.add('active');

          loadVessels();
          matchInterval = setInterval(() => {
            loadVessels();
            const match = findMatchingVessel();
            if (match) showResult(match);
            else showNoMatch();
          }, 1500);
        },
        () => {
          status.textContent = S.no_gps;
          status.className = 'spot-status error';
          btn.disabled = false;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function stopSpotting() {
      active = false;
      window.removeEventListener('deviceorientationabsolute', onOrientation, true);
      window.removeEventListener('deviceorientation', onOrientation, true);
      if (matchInterval) clearInterval(matchInterval);
      $('t-start').textContent = S.start;
      $('spot-start').classList.remove('stop-btn');
      $('spot-scanner').classList.remove('active');
      $('spot-status').textContent = '';
    }

    $('spot-start').addEventListener('click', startSpotting);
    loadVessels();
  </script>
</body>
</html>
